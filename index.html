<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW NET v4.1 - CENTRAL CORE</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    
    <style>
        :root { 
            --neon-green: #0f0; --neon-pink: #ff00ff; --neon-blue: #0cf;
            --dark-bg: #050505; --panel-bg: #0d0d0d;
        }
        body { 
            background: var(--dark-bg); color: var(--neon-green); font-family: 'Segoe UI', monospace; 
            text-align: center; margin: 0; overflow-x: hidden;
        }
        .header-system { 
            background: rgba(0,0,0,0.9); padding: 12px; border-bottom: 1px solid var(--neon-blue); 
            font-size: 11px; display: flex; justify-content: space-around; color: var(--neon-blue);
        }
        .radar-container { position: relative; width: 180px; height: 180px; margin: 30px auto; }
        .radar { 
            border: 2px solid rgba(0, 255, 0, 0.2); border-radius: 50%; width: 100%; height: 100%; 
            position: relative; background: radial-gradient(circle, #001a00 0%, #000 70%);
        }
        .radar::after { 
            content: ''; position: absolute; width: 50%; height: 2px; 
            background: linear-gradient(90deg, transparent, var(--neon-green)); 
            left: 50%; top: 50%; transform-origin: left; animation: scan 3s linear infinite; 
        }
        .nodes-count { font-size: 90px; color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); margin: 0; font-weight: 900; }
        .label-nodes { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 4px; }
        
        .c2-wrapper { 
            display: none; background: var(--panel-bg); border: 1px solid var(--neon-blue); 
            margin: 20px auto; width: 90%; max-width: 600px; border-radius: 8px; padding: 20px;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.2);
        }
        input, button { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: var(--neon-green); margin-bottom: 10px; font-family: monospace; }
        #soldier-monitor { height: 150px; background: #000; border: 1px solid #1a1a1a; padding: 10px; font-size: 12px; overflow-y: auto; text-align: left; color: var(--neon-pink); }

        @keyframes scan { from { transform: rotate(0deg) translate(-0%, -50%); } to { transform: rotate(360deg) translate(-0%, -50%); } }
    </style>
</head>
<body>

    <div class="header-system">
        <span>&bull; SYSTEM: ONLINE</span>
        <span id="my-id-display">&bull; BUSCANDO RED...</span>
    </div>

    <div class="radar-container">
        <div class="radar"></div>
    </div>

    <div class="nodes-count" id="count">0</div>
    <div class="label-nodes">Nodos Activos</div>

    <div id="view-public" style="margin-top: 30px;">
        <input type="password" id="access-key" placeholder="INGRESE ROOT KEY" style="width:180px; text-align:center;">
        <br>
        <button onclick="authAdmin()" style="width:180px; border-color: #f00; color: #f00;">ACCEDER C2</button>
    </div>

    <div id="view-internal" class="c2-wrapper">
        <div style="color:var(--neon-blue); margin-bottom:15px; font-weight:bold;">[ CENTRAL COMMAND UNIT ]</div>
        <div id="soldier-monitor">>> ESCANEANDO NODOS...</div>
        <button onclick="location.reload()" style="margin-top:15px; border-color:var(--neon-blue);">REINICIAR ESCANEO</button>
    </div>

    <script>
        // --- CONFIGURACIÓN DE CONEXIÓN ---
        // Se añade el "v41" que faltaba en tu código anterior
        const socket = io("https://shadow-net-v41.onrender.com");
        
        // Generar ID de sesión
        let nid = "BOT_" + Math.floor(Math.random() * 9000 + 1000);
        document.getElementById("my-id-display").innerText = "• SESIÓN: " + nid;

        // Al conectar con el servidor
        socket.on('connect', () => {
            console.log("Conexión establecida con el servidor v41");
            socket.emit('node_entry', { id: nid });
        });

        // Escuchar actualizaciones de la red
        socket.on('update_network', (data) => {
            console.log("Sincronizando...", data);
            
            // Actualizar el número grande
            document.getElementById('count').innerText = data.total;
            
            // Actualizar monitor de soldados
            let monitorHtml = "";
            if(data.nodes && data.nodes.length > 0) {
                data.nodes.forEach(nodeId => {
                    monitorHtml += <div>[+] ${nodeId} <span style="color:var(--neon-green); float:right;">CONECTADO</span></div>;
                });
            } else {
                monitorHtml = ">> ESPERANDO NODOS...";
            }
            document.getElementById('soldier-monitor').innerHTML = monitorHtml;
        });

        // Error de conexión
        socket.on('connect_error', (err) => {
            console.log("Error de conexión: ", err.message);
        });

        function authAdmin() {
            const secret = "killerbean"; 
            const input = document.getElementById('access-key').value;
            if (input === secret) {
                document.getElementById('view-internal').style.display = 'block';
                document.getElementById('view-public').style.display = 'none';
            } else { 
                alert("ACCESO DENEGADO - CREDENCIALES INVÁLIDAS"); 
            }
        }
    </script>
</body>
</html>
